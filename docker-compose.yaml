services:
  db:
    image: postgres:15-alpine
    container_name: kuji-postgres
    restart: always
    environment:
      POSTGRES_USER: kuji_user
      POSTGRES_PASSWORD: kuji_password
      POSTGRES_DB: kuji_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kuji-redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
